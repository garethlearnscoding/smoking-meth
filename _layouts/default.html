<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ /assets/styles/style.css | relative_url }}">
</head>

<body>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'],['\\(', '\\)']]}
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <aside class="sidebar">
    <div class="title">Crystal Meth</div>

    <!-- <a href="/">Home</a>
    <a href="/10-sequences-and-series/">10 Sequences and Series</a> -->
    {% for page in site.data.nav %}
      <a href="{{page.link | relative_url}}">{{page.name}}</a>
    {% endfor %}
  </aside>

  <main class="content">
    {{ content }}
  </main>

</body>
</html>
